<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --one: #bdd7ff;
            --two: #4c94ff;
            --three: #103064;
        }

        body {
            background-color: var(--one);
            margin: 0
        }

        svg {
            height: 100vh;
            width: 100%;
            display: block;
        }

        rect[y="0"] {
            fill: var(--two)
        }

        rect[y="100"] {
            fill: var(--one)
        }

        path {
            transition: .35s cubic-bezier(.3, .2, .1, 1.4);
            fill: none;
            stroke: var(--two);
            stroke-width: 10;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        #floor {
            stroke: url(#one);
        }

        rect[y="100"] {
            fill: url(#one)
        }


        #roof {
            stroke: url(#two);
        }

        rect[y="0"] {
            fill: url(#two)
        }

        #one :first-child {
            stop-color: var(--one)
        }

        #one :last-child {
            stop-color: var(--two)
        }

        #two :first-child {
            stop-color: var(--two)
        }

        #two :last-child {
            stop-color: var(--three)
        }
    </style>
</head>

<body>
    <svg viewBox="0 0 190 200" preserveAspectRatio="xMidYMid slice" ; style="position:fixed; top:0;">
        <linearGradient id="one" x1="0%" x2="100%" y1="0%" y2="100%" gradientUnits="userSpaceOnUse">
            <stop offset="0" />
            <stop offset="1" />
        </linearGradient>
        <linearGradient id="two" x1="0%" x2="100%" y1="0%" y2="100%" gradientUnits="userSpaceOnUse">
            <stop offset="0" />
            <stop offset="1" />
        </linearGradient>
        <g transform="translate(50, -70) rotate(30) scale(1.3)">
            <rect x="0" y="0" width="200" height="100" />
            <rect x="0" y="100" width="200" height="100" />
            <path id="roof" />
            <path id="floor" />

        </g>
    </svg>
    <script>
        // tiny-as random min-max function
        function rMe(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        // grap my path
        let roof = document.getElementById("roof");

        let floor = document.getElementById("floor");
        function randomWaves() {
            roof.setAttribute(
                "d",
                "M 0 0 V" +
                rMe(100, 110) +
                " M 20 0 V" +
                rMe(100, 120) +
                " M 40 0 V" +
                rMe(100, 130) +
                " M 60 0 V" +
                rMe(100, 150) +
                " M 80 0 V" +
                rMe(100, 130) +
                " M 100 0 V" +
                rMe(100, 150) +
                " M 120 0 V" +
                rMe(100, 140) +
                " M 140 0 V" +
                rMe(100, 130) +
                " M 160 0 V" +
                rMe(100, 120) +
                " M 180 0 V" +
                rMe(100, 110)
            );

            floor.setAttribute(
                "d",
                "M 10 200 V" +
                rMe(100, 95) +
                " M 30 200 V" +
                rMe(100, 90) +
                " M 50 200 V" +
                rMe(100, 85) +
                " M 70 200 V" +
                rMe(100, 70) +
                " M 90 200 V" +
                rMe(100, 95) +
                " M 110 200 V" +
                rMe(100, 65) +
                " M 130 200 V" +
                rMe(100, 70) +
                " M 150 200 V" +
                rMe(100, 75) +
                " M 170 200 V" +
                rMe(100, 90) +
                " M 190 200 V" +
                rMe(100, 95)
            );
        }
        randomWaves();

        document.addEventListener("click", function () {
            randomWaves();
        });

        var reGenTimer = window.setInterval(function () {
            randomWaves();
        }, 400);

    </script>
</body>

</html>
